<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STC OEE 대시보드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .container { 
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { font-size: 32px; margin-bottom: 10px; }
        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        label { font-weight: 600; color: white; }
        select, button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }
        select { min-width: 150px; }
        button { 
            background: #ff6b6b;
            color: white;
            font-weight: 600;
        }
        button:hover { background: #ff5252; }

        .kpi-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #2196F3;
        }
        .kpi-label { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 10px; }
        .kpi-value { font-size: 36px; font-weight: bold; margin-bottom: 10px; }
        .kpi-target { font-size: 12px; color: #666; }
        .kpi-card.success { border-left-color: #4CAF50; }
        .kpi-card.warning { border-left-color: #FF9800; }
        .kpi-card.danger { border-left-color: #f44336; }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chart-card h3 { margin-bottom: 15px; color: #333; }

        .data-table {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #ddd;
            font-size: 12px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        tr:hover { background: #f9f9f9; }

        .summary-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .summary-item {
            text-align: center;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        .summary-item-label { font-size: 12px; color: #999; margin-bottom: 10px; }
        .summary-item-value { font-size: 28px; font-weight: bold; color: #2196F3; }

        .loading { text-align: center; padding: 40px; font-size: 18px; color: #666; }
        .error { 
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏭 STC OEE 대시보드</h1>
            <p>설비 종합효율 실시간 모니터링</p>
            <div class="controls">
                <div class="control-group">
                    <label>범위:</label>
                    <select id="scopeSelect">
                        <option value="all">전체 (주말포함)</option>
                        <option value="regular">정규만 (특근제외)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>주차:</label>
                    <select id="weekSelect">
                        <option value="W27">W27 (2026-06-24~06-30)</option>
                    </select>
                </div>
                <button onclick="exportPDF()">📄 PDF 다운로드</button>
            </div>
        </header>

        <div id="loading" class="loading">데이터를 로드 중입니다...</div>
        <div id="error" style="display:none;" class="error"></div>
        <div id="content" style="display:none;">
            <!-- KPI 카드 -->
            <div class="kpi-section">
                <div class="kpi-card" id="kpi-a">
                    <div class="kpi-label">Availability (가동률)</div>
                    <div class="kpi-value" id="val-a">-</div>
                    <div class="kpi-target">목표: 89%</div>
                </div>
                <div class="kpi-card" id="kpi-p">
                    <div class="kpi-label">Performance (성능)</div>
                    <div class="kpi-value" id="val-p">-</div>
                    <div class="kpi-target">목표: 99%</div>
                </div>
                <div class="kpi-card" id="kpi-q">
                    <div class="kpi-label">Quality (품질)</div>
                    <div class="kpi-value" id="val-q">-</div>
                    <div class="kpi-target">목표: 96.5%</div>
                </div>
                <div class="kpi-card" id="kpi-oee">
                    <div class="kpi-label">OEE (종합효율)</div>
                    <div class="kpi-value" id="val-oee">-</div>
                    <div class="kpi-target">목표: 85%</div>
                </div>
            </div>

            <!-- 차트 -->
            <div class="charts-section">
                <div class="chart-card">
                    <h3>📊 일별 OEE 추이</h3>
                    <canvas id="chart-oee"></canvas>
                </div>
                <div class="chart-card">
                    <h3>📉 Loss Top 5</h3>
                    <canvas id="chart-loss"></canvas>
                </div>
            </div>

            <!-- 데이터 테이블 -->
            <div class="data-table">
                <h3 style="padding: 20px 20px 0 20px;">📋 일별 A/P/Q 실적</h3>
                <table>
                    <thead>
                        <tr>
                            <th>일자</th>
                            <th>설비</th>
                            <th>A (%)</th>
                            <th>P (%)</th>
                            <th>Q (%)</th>
                            <th>OEE (%)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <!-- 종합 서머리 -->
            <div class="summary-section">
                <h3>📈 주차 종합 서머리</h3>
                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="summary-item-label">총 가동률 (A)</div>
                        <div class="summary-item-value" id="sum-a">-</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-item-label">총 성능 (P)</div>
                        <div class="summary-item-value" id="sum-p">-</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-item-label">총 품질 (Q)</div>
                        <div class="summary-item-value" id="sum-q">-</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-item-label">총 OEE</div>
                        <div class="summary-item-value" id="sum-oee">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // W27 기본 데이터 (임시)
        const DATA = {
            A: [
                {일자: "2026-06-24", 주차: "W27", 설비명: "DC1", 교대: "주간", 구분: "정규", 계획시간_분: 480, 가동시간_분: 380, 가동률: 0.792},
                {일자: "2026-06-24", 주차: "W27", 설비명: "DC2", 교대: "주간", 구분: "정규", 계획시간_분: 480, 가동시간_분: 420, 가동률: 0.875},
            ],
            P: [
                {일자: "2026-06-24", 주차: "W27", 설비명: "DC1", 교대: "주간", 구분: "정규", 성능: 0.997},
                {일자: "2026-06-24", 주차: "W27", 설비명: "DC2", 교대: "주간", 구분: "정규", 성능: 0.998},
            ],
            Q: [
                {일자: "2026-06-24", 주차: "W27", 설비명: "DC1", 교대: "주간", 구분: "정규", 품질: 0.902},
                {일자: "2026-06-24", 주차: "W27", 설비명: "DC2", 교대: "주간", 구분: "정규", 품질: 0.905},
            ]
        };

        function render() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            // KPI 계산 (간단한 예시)
            const avgA = 0.738;
            const avgP = 0.997;
            const avgQ = 0.902;
            const oee = (avgA * avgP * avgQ * 100).toFixed(1);

            document.getElementById('val-a').textContent = (avgA * 100).toFixed(1) + '%';
            document.getElementById('val-p').textContent = (avgP * 100).toFixed(1) + '%';
            document.getElementById('val-q').textContent = (avgQ * 100).toFixed(1) + '%';
            document.getElementById('val-oee').textContent = oee + '%';

            // KPI 카드 색상
            ['val-a', 'val-p', 'val-q', 'val-oee'].forEach(id => {
                const value = parseFloat(document.getElementById(id).textContent);
                const card = document.getElementById(id).closest('.kpi-card');
                card.classList.remove('success', 'warning', 'danger');
                if (value >= 90) card.classList.add('success');
                else if (value >= 75) card.classList.add('warning');
                else card.classList.add('danger');
            });

            // 간단한 차트
            renderCharts();
            renderTable();
            renderSummary();
        }

        function renderCharts() {
            // OEE 추이 (간단한 데이터)
            const ctx1 = document.getElementById('chart-oee').getContext('2d');
            new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['6/24', '6/25', '6/26', '6/27', '6/28', '6/29', '6/30'],
                    datasets: [{
                        label: 'OEE (%)',
                        data: [65, 66, 67, 65, 68, 66, 66],
                        borderColor: '#2196F3',
                        backgroundColor: 'rgba(33, 150, 243, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: true } } }
            });

            // Loss Top 5
            const ctx2 = document.getElementById('chart-loss').getContext('2d');
            new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['로트마크·사상', '핀파손', '제품소착', '조건변경', '금형교체'],
                    datasets: [{
                        data: [9.6, 9.3, 8.7, 7.7, 7.5],
                        backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF']
                    }]
                },
                options: { responsive: true }
            });
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `
                <tr>
                    <td>2026-06-24</td>
                    <td>DC1</td>
                    <td>79.2%</td>
                    <td>99.7%</td>
                    <td>90.2%</td>
                    <td>71.2%</td>
                </tr>
                <tr>
                    <td>2026-06-24</td>
                    <td>DC2</td>
                    <td>87.5%</td>
                    <td>99.8%</td>
                    <td>90.5%</td>
                    <td>78.5%</td>
                </tr>
            `;
        }

        function renderSummary() {
            document.getElementById('sum-a').textContent = '73.8%';
            document.getElementById('sum-p').textContent = '99.7%';
            document.getElementById('sum-q').textContent = '90.2%';
            document.getElementById('sum-oee').textContent = '66.3%';
        }

        function exportPDF() {
            alert('PDF 다운로드 기능은 추후 추가됩니다.');
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(render, 500);
        });
    </script>
</body>
</html>
